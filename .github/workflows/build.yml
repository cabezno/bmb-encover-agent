name: Build BMB Encover Agent

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -e . --no-deps
          pip install -e .[pty,cli,mcp,cron,acp]

      - name: Build bmb (CLI)
        run: pyinstaller --clean bmb-encover.spec

      - name: Build bmb-app-server (App Server)
        run: pyinstaller --clean app-server.spec

      - name: Upload Windows bmb CLI
        uses: actions/upload-artifact@v4
        with:
          name: bmb-windows-x64
          path: dist/bmb.exe

      - name: Upload Windows App Server
        uses: actions/upload-artifact@v4
        with:
          name: bmb-app-server-windows-x64
          path: dist/bmb-app-server.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -e . --no-deps
          pip install -e .[pty,cli,mcp,cron,acp]

      - name: Build with PyInstaller
        run: pyinstaller --clean bmb-encover.spec

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: bmb-linux-x64
          path: dist/bmb

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -e . --no-deps
          pip install -e .[pty,cli,mcp,cron,acp]

      - name: Build with PyInstaller
        run: pyinstaller --clean bmb-encover.spec

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: bmb-macos-x64
          path: dist/bmb

  build-flutter-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29"
          channel: "stable"

      - name: Install dependencies
        run: |
          cd bmb_app
          flutter pub get

      - name: Configure Windows platform
        run: |
          cd bmb_app
          flutter create --platforms windows . 2>&1 | tail -5

      - name: Build Windows
        run: |
          cd bmb_app
          flutter build windows --release

      - name: Upload Flutter Windows
        uses: actions/upload-artifact@v4
        with:
          name: bmb-flutter-windows-x64
          path: bmb_app/build/windows/runner/Release/bmb_app.exe

  build-flutter-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29"
          channel: "stable"

      - name: Install dependencies
        run: |
          cd bmb_app
          flutter pub get

      - name: Configure Android platform
        run: |
          cd bmb_app
          flutter create --platforms android . 2>&1 | tail -5

      - name: Build APK
        run: |
          cd bmb_app
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bmb-flutter-android
          path: bmb_app/build/app/outputs/flutter-apk/app-release.apk

  create-release:
    needs: [build-windows, build-linux, build-macos, build-flutter-windows, build-flutter-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bmb-windows-x64/bmb.exe
            bmb-linux-x64/bmb
            bmb-macos-x64/bmb
            bmb-flutter-windows-x64/bmb_app.exe
            bmb-flutter-android/bmb_app.apk
